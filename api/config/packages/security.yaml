security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            stateless: false
            provider: app_user_provider
            json_login:
                check_path: auth_login
                username_path: email
                password_path: password
            logout:
                path: /auth/logout

    access_control:
        - { path: ^/users$, methods: [POST], roles: PUBLIC_ACCESS }
        - { path: ^/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/forgot-password$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/reset-password$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/change-password$, roles: ROLE_USER }
        - { path: ^/api/me$, roles: ROLE_USER }
        - { path: ^/media-objects, methods: [POST], roles: ROLE_USER }
        - { path: ^/docs, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
